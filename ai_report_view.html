<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>صحتك - التقرير الصحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--teal:#17b8a6;--teal-light:#3ddecb;--bg:#f7fafc;--white:#ffffff;--text-dark:#1a2332;--text-mid:#4a5568;--text-light:#a0aec0;--border:#e2e8f0;--green:#48bb78;--green-bg:rgba(72,187,120,0.1);--orange:#ed8936;--orange-bg:rgba(237,137,54,0.15);--red:#f56565;--red-bg:rgba(245,101,101,0.1);--blue:#63b3ed;--blue-bg:rgba(99,179,237,0.1)}
        body{font-family:'Cairo',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow-x:hidden}
        body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.18;z-index:0}
        body::before{width:500px;height:500px;background:var(--teal);top:-150px;right:-150px}
        body::after{width:400px;height:400px;background:var(--teal-light);bottom:-100px;left:-100px}
        .phone-frame{position:relative;z-index:1;width:100%;max-width:390px}
        .phone-card{background:var(--white);border-radius:40px;box-shadow:0 24px 60px rgba(0,0,0,.22),inset 0 0 0 1.5px rgba(255,255,255,.5);width:100%;height:780px;display:flex;flex-direction:column;border:2px solid #2a2a2a;overflow:hidden}
        .status-bar{background:#000;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
        .status-time{color:#fff;font-size:12px;font-weight:700}
        .status-icons{display:flex;gap:5px}
        .status-icons svg{width:14px;height:14px;fill:#fff}
        .screen-content{flex:1;overflow-y:auto;padding-bottom:24px;background:var(--white)}

        /* Header */
        .top-header{background:linear-gradient(135deg,#0f9e8e 0%,#17b8a6 50%,#3ddecb 100%);padding:24px 24px 36px;border-bottom-left-radius:30px;border-bottom-right-radius:30px;display:flex;justify-content:space-between;align-items:center;color:white;position:relative}
        .header-title{font-size:22px;font-weight:800}
        .back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.2);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .back-btn svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .report-date{font-size:12px;color:rgba(255,255,255,0.8);font-weight:600;position:absolute;bottom:14px;right:24px}

        .container{padding:0 24px;margin-top:20px}

        /* Risk Badge */
        .risk-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:30px;font-size:14px;font-weight:800;margin-bottom:16px}
        .risk-badge.low{background:var(--green-bg);color:var(--green)}
        .risk-badge.medium{background:var(--orange-bg);color:var(--orange)}
        .risk-badge.high{background:var(--red-bg);color:var(--red)}
        .risk-badge svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5}

        /* AI Icon Header */
        .ai-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
        .ai-icon{width:42px;height:42px;border-radius:12px;background:var(--teal);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(23,184,166,0.35)}
        .ai-icon svg{width:22px;height:22px;stroke:white;stroke-width:2;fill:none}
        .ai-title{font-size:18px;font-weight:800;color:var(--text-dark);flex:1}

        /* Report Content */
        .report-card{background:linear-gradient(135deg,#f0fdf4,#f0f9ff);border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid rgba(23,184,166,0.1)}
        .report-text{font-size:14px;color:var(--text-mid);line-height:2;text-align:right;font-weight:600;white-space:pre-wrap}

        /* Tips Section */
        .tips-card{background:#faf5ff;border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid rgba(159,122,234,0.1)}
        .tips-title{font-size:15px;font-weight:800;color:var(--text-dark);margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .tips-title svg{width:18px;height:18px;stroke:#9f7aea;fill:none;stroke-width:2}
        .tip-item{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:13px;color:var(--text-mid);font-weight:600;line-height:1.7;display:flex;align-items:flex-start;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
        .tip-num{width:24px;height:24px;border-radius:50%;background:var(--teal);color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}

        /* Disclaimer */
        .disclaimer{background:#fffbeb;border-radius:14px;padding:14px;margin-bottom:20px;display:flex;align-items:flex-start;gap:10px;border:1px solid rgba(237,137,54,0.15)}
        .disclaimer svg{width:20px;height:20px;stroke:var(--orange);fill:none;stroke-width:2;flex-shrink:0;margin-top:2px}
        .disclaimer p{font-size:12px;color:var(--text-mid);font-weight:600;line-height:1.6}

        /* Loading */
        .loading{text-align:center;padding:60px 20px;color:var(--text-light);font-size:14px;font-weight:600}
        .loading .dots{display:inline-flex;gap:6px;margin-bottom:12px}
        .loading .dot{width:10px;height:10px;background:var(--teal);border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
        .loading .dot:nth-child(1){animation-delay:-0.32s}
        .loading .dot:nth-child(2){animation-delay:-0.16s}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

        /* Bottom nav */
        .bottom-nav{display:flex;justify-content:space-between;align-items:center;background:white;padding:12px 28px 18px;border-top:1px solid var(--border);flex-shrink:0;border-bottom-left-radius:36px;border-bottom-right-radius:36px}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text-light);text-decoration:none;font-size:11px;font-weight:700;transition:color 0.2s}
        .nav-item svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .nav-item.active{color:var(--teal)}
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-card">
            <div class="status-bar">
                <span class="status-time" id="statusTime">09:41</span>
                <div class="status-icons">
                    <svg viewBox="0 0 24 24"><path d="M1 6l5 5 5-5 5 5 5-5"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
                    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/><path d="M22 11v2" stroke="white" stroke-width="2" stroke-linecap="round"/><rect x="4" y="9" width="11" height="6" rx="1" fill="white" opacity=".85"/></svg>
                </div>
            </div>

            <div class="screen-content">
                <div class="top-header">
                    <button class="back-btn" onclick="history.back()">
                        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div class="header-title">التقرير الصحي</div>
                    <div class="report-date" id="reportDate"></div>
                </div>

                <div class="container">
                    <!-- Loading -->
                    <div class="loading" id="loadingState">
                        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div>جارٍ تحميل التقرير...</div>
                    </div>

                    <!-- Content (hidden until loaded) -->
                    <div id="reportContent" style="display:none;">
                        <!-- AI Header -->
                        <div class="ai-header">
                            <div class="ai-icon">
                                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
                                    <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
                                </svg>
                            </div>
                            <div class="ai-title">تحليل الذكاء الاصطناعي</div>
                        </div>

                        <!-- Risk Level -->
                        <div id="riskBadge" class="risk-badge low">
                            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            <span id="riskText">منخفض</span>
                        </div>

                        <!-- Summary -->
                        <div class="report-card">
                            <div class="report-text" id="summaryText"></div>
                        </div>

                        <!-- Tips -->
                        <div class="tips-card" id="tipsSection" style="display:none;">
                            <div class="tips-title">
                                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                                نصائح وإرشادات
                            </div>
                            <div id="tipsList"></div>
                        </div>

                        <!-- Disclaimer -->
                        <div class="disclaimer">
                            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            <p>هذا تقرير أولي تم إنشاؤه بواسطة الذكاء الاصطناعي وليس بديلاً عن الاستشارة الطبية المتخصصة. يُرجى مراجعة طبيبك للتقييم النهائي.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav">
                <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>الرئيسية</span></a>
                <a href="profile.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>الملف</span></a>
                <a href="calendar.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>التقويم</span></a>
                <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>الإعدادات</span></a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // جلب ID التقرير من URL
        const params = new URLSearchParams(window.location.search);
        const reportId = params.get('id');

        const riskLabels = { low: 'مستوى خطورة منخفض', medium: 'مستوى خطورة متوسط', high: 'مستوى خطورة مرتفع' };
        const riskIcons = {
            low: '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            medium: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
            high: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
        };

        function renderReport(report) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('reportContent').style.display = 'block';

            // Date
            if (report.created_at || report.report_date) {
                const d = new Date(report.created_at || report.report_date);
                document.getElementById('reportDate').textContent = d.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
            }

            // Risk level
            const risk = (report.risk_level || 'low').toLowerCase();
            const badge = document.getElementById('riskBadge');
            badge.className = 'risk-badge ' + risk;
            badge.innerHTML = (riskIcons[risk] || riskIcons.low) + '<span>' + (riskLabels[risk] || report.risk_level) + '</span>';

            // Summary text
            const summary = report.summary || '';
            // Split summary into main text and tips
            const parts = summary.split(/نصائح:|النصائح:|tips:/i);
            const mainText = parts[0].trim();
            
            document.getElementById('summaryText').textContent = mainText;

            // Extract tips if embedded in summary
            let tips = [];
            if (parts.length > 1) {
                tips = parts[1].split(/[-•\n]/).map(t => t.trim()).filter(t => t.length > 3);
            }
            // Also check if tips is a separate field
            if (report.tips && Array.isArray(report.tips)) {
                tips = report.tips;
            }

            if (tips.length > 0) {
                document.getElementById('tipsSection').style.display = 'block';
                const tipsList = document.getElementById('tipsList');
                tipsList.innerHTML = '';
                tips.forEach((tip, i) => {
                    tipsList.innerHTML += `<div class="tip-item"><div class="tip-num">${i + 1}</div><div>${tip}</div></div>`;
                });
            }
        }

        // Load report
        (async function init() {
            // دائماً نشيك localStorage أول
            const savedReport = localStorage.getItem('sehatak_last_report');
            
            if (savedReport) {
                try {
                    const report = JSON.parse(savedReport);
                    renderReport(report);
                    return;
                } catch(e) {}
            }

            // لو ما فيه بالـ localStorage ومعنا ID، نجرب Supabase
            if (reportId) {
                try {
                    const { data, error } = await sb.from('ai_daily_reports')
                        .select('*')
                        .eq('id', reportId)
                        .maybeSingle();

                    if (!error && data) {
                        renderReport(data);
                        return;
                    }
                } catch(e) {}
            }

            // آخر محاولة — آخر تقرير من Supabase
            try {
                const userId = localStorage.getItem('sehatak_user_id');
                if (userId) {
                    const { data } = await sb.from('ai_daily_reports')
                        .select('*')
                        .eq('user_id', userId)
                        .order('created_at', { ascending: false })
                        .limit(1)
                        .maybeSingle();

                    if (data) { renderReport(data); return; }
                }
            } catch(e) {}

            document.getElementById('loadingState').innerHTML = '<div style="color:var(--text-light);font-weight:700;">لا توجد تقارير بعد — اطلب تقرير من صفحة الملف الصحي</div>';
        })();
    </script>
</body>
</html>
