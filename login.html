<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صحتك - تسجيل الدخول</title>
  <meta name="description" content="سجّل دخولك إلى تطبيق صحتك للمتابعة الصحية الذكية" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal-dark: #0f9e8e;
      --teal-mid: #17b8a6;
      --teal-light: #2fd4c0;
      --teal-bright: #3ddecb;
      --teal-glow: rgba(23, 184, 166, .25);
      --text-dark: #1a2332;
      --text-mid: #4a5568;
      --text-light: #a0aec0;
      --border: #e2e8f0;
      --bg: #f7fafc;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, .08);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, .10);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, .14);
      --radius: 16px;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle background blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .18;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: var(--teal-mid);
      top: -150px;
      right: -150px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: var(--teal-light);
      bottom: -100px;
      left: -100px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: 28px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: slideUp .55s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0f9e8e 0%, #17b8a6 45%, #3ddecb 100%);
      padding: 36px 30px 44px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      background: rgba(255, 255, 255, .08);
      border-radius: 50%;
      top: -80px;
      left: -60px;
    }

    .header::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, .06);
      border-radius: 50%;
      bottom: -50px;
      right: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .brand-icon {
      width: 54px;
      height: 54px;
      background: rgba(255, 255, 255, .22);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255, 255, 255, .35);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .10);
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 28px;
      height: 28px;
    }

    .brand-name {
      color: var(--white);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .5px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .12);
    }

    .brand-sub {
      color: rgba(255, 255, 255, .82);
      font-size: 13px;
      font-weight: 400;
      margin-top: 6px;
      position: relative;
      z-index: 1;
      letter-spacing: .3px;
    }

    /* floating dots decoration */
    .header-dots {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      gap: 7px;
      z-index: 1;
    }

    .header-dots span {
      width: 7px;
      height: 7px;
      background: rgba(255, 255, 255, .4);
      border-radius: 50%;
    }

    /* ── Body ── */
    .body {
      padding: 34px 30px 30px;
    }

    .section-title {
      text-align: center;
      color: var(--text-dark);
      font-size: 23px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .section-sub {
      text-align: center;
      color: var(--text-mid);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      color: var(--text-dark);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 14px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color .2s;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 44px 13px 14px;
      border: 1.8px solid var(--border);
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: var(--white);
      transition: border-color .25s, box-shadow .25s;
      outline: none;
      direction: rtl;
    }

    .input-wrap input::placeholder {
      color: var(--text-light);
    }

    .input-wrap input:focus {
      border-color: var(--teal-mid);
      box-shadow: 0 0 0 4px var(--teal-glow);
    }

    .input-wrap input:focus+.icon,
    .input-wrap:focus-within .icon {
      color: var(--teal-mid);
    }

    /* eye toggle */
    .eye-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      display: flex;
      align-items: center;
      transition: color .2s;
      padding: 4px;
    }

    .eye-btn:hover {
      color: var(--teal-mid);
    }

    .forgot-row {
      text-align: left;
      margin-top: 8px;
    }

    .forgot-link {
      color: var(--teal-mid);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: color .2s;
    }

    .forgot-link:hover {
      color: var(--teal-dark);
      text-decoration: underline;
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal-mid) 60%, var(--teal-bright) 100%);
      color: var(--white);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 6px 20px rgba(23, 184, 166, .40);
      transition: transform .18s, box-shadow .18s, filter .18s;
      letter-spacing: .4px;
    }

    .btn-primary:hover {
      filter: brightness(1.07);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(23, 184, 166, .50);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }

    .divider hr {
      flex: 1;
      border: none;
      border-top: 1.5px solid var(--border);
    }

    .divider span {
      color: var(--text-light);
      font-size: 13px;
      white-space: nowrap;
    }

    /* ── Social buttons ── */
    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--white);
      border: 1.8px solid var(--border);
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .18s, box-shadow .18s;
      margin-bottom: 12px;
    }

    .btn-social:hover {
      background: #f9fafb;
      border-color: #c0cad8;
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .btn-social:last-of-type {
      margin-bottom: 0;
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .apple-icon {
      width: 20px;
      height: 20px;
      fill: var(--text-dark);
    }

    /* ── Footer link ── */
    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: var(--text-mid);
    }

    .footer-link a {
      color: var(--teal-mid);
      font-weight: 700;
      text-decoration: none;
      transition: color .2s;
    }

    .footer-link a:hover {
      color: var(--teal-dark);
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      .body {
        padding: 26px 22px 24px;
      }

      .header {
        padding: 28px 22px 36px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="header-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="brand">
        <div class="brand-icon">
          <!-- heart pulse icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 21C12 21 3 15.5 3 9.5C3 7.01 5.01 5 7.5 5C9.01 5 10.36 5.75 11.24 6.9L12 7.8L12.76 6.9C13.64 5.75 14.99 5 16.5 5C18.99 5 21 7.01 21 9.5C21 15.5 12 21 12 21Z"
              fill="white" />
            <path d="M6 11h2.5l1.5-2 2 4 1.5-3 1 1H19" stroke="rgba(255,255,255,0.5)" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <div class="brand-name">صحتك</div>
        </div>
      </div>
      <div class="brand-sub">متابعة صحية ذكية</div>
    </div>

    <!-- Body -->
    <div class="body">
      <h1 class="section-title">تسجيل الدخول</h1>
      <p class="section-sub">مرحباً بعودتك</p>

      <form id="loginForm" novalidate>
        <!-- Email / Phone -->
        <div class="form-group">
          <label class="form-label" for="email">البريد الإلكتروني أو رقم الهاتف</label>
          <div class="input-wrap">
            <input type="text" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" autocomplete="username" />
            <span class="icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="3" />
                <path d="M2 7l10 7 10-7" />
              </svg>
            </span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">كلمة المرور</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور"
              autocomplete="current-password" />
            <span class="icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <button type="button" class="eye-btn" id="togglePwd" aria-label="إظهار كلمة المرور">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="forgot-row">
            <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">تسجيل الدخول</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <hr /><span>أو</span>
        <hr />
      </div>

      <!-- Social -->
      <button class="btn-social" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
          <path fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
          <path fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
          <path fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          <path fill="none" d="M0 0h48v48H0z" />
        </svg>
        تسجيل عبر Google
      </button>

      <button class="btn-social" id="appleBtn">
        <svg class="apple-icon" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.3 269-317.3 vs71 0 129.9 40.6 174.4 40.6 42.6 0 109.5-44.6 185.2-44.6zm-19-194.3c37.1-44.6 65.6-107 65.6-169.3 0-8.9-.6-17.9-2.2-25.2-62.8 2.3-138.2 42.1-183.6 93.7-35.4 39.5-70.1 101.9-70.1 165.3 0 9.5 1.6 19 2.2 22.1 4.5.6 11.7 1.6 18.9 1.6 56.4 0 126.8-37.8 169.2-87.7v-.5z" />
        </svg>
        تسجيل عبر Apple
      </button>

      <!-- Footer -->
      <p class="footer-link">ليس لديك حساب؟ <a href="signup.html">إنشاء حساب</a></p>
    </div>
  </div>

  <!-- Supabase + App Logic -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // Toggle password visibility
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpen = `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    let visible = false;
    togglePwd.addEventListener('click', () => {
      visible = !visible;
      pwdInput.type = visible ? 'text' : 'password';
      eyeIcon.innerHTML = visible ? eyeClosed : eyeOpen;
    });

    // Form submit → Supabase Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('أدخل الإيميل وكلمة المرور', 'error');
        return;
      }

      btn.textContent = '⏳ جارٍ الدخول…';
      btn.disabled = true;

      try {
        const loginData = await authLogin(email, password);
        // حفظ الـ user_id بالـ localStorage عشان الصفحات الثانية تلقاه
        if (loginData && loginData.user) {
          localStorage.setItem('sehatak_user_id', loginData.user.id);
          localStorage.setItem('sehatak_user_email', loginData.user.email);
        }
        showToast('تم تسجيل الدخول بنجاح', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 500);
      } catch (err) {
        console.error('Login error:', err);
        showToast(err.message || 'الإيميل أو كلمة المرور غير صحيحة', 'error');
        btn.textContent = 'تسجيل الدخول';
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
